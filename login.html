<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login MedicaMais</title>
</head>
<body>
  <h1>Login</h1>

  <input id="email" type="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button id="btnLogin" onclick="login()">Entrar</button>

  <p id="mensagem"></p>

  <script>
    function login() {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;
      const mensagem = document.getElementById("mensagem");

      if (!email || !senha) {
        mensagem.innerText = "Email e senha são obrigatórios";
      } else if (email === "suzanakarolaynne@gmail.com" && senha === "12345678") {
        mensagem.innerText = "Login realizado com sucesso";
      } else {
        mensagem.innerText = "Credenciais inválidas";
      }
    }
  </script>
</body>
</html>
